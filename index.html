<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨西哥邮编偏远区查询系统</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 95%;
      max-width: 700px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #1f2937;
      text-align: center;
    }

    .desc {
      text-align: center;
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 18px;
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 14px;
      display: none;
      line-height: 1.8;
    }

    .normal {
      background: #ecfdf5;
      border: 1px solid #10b981;
      color: #065f46;
    }

    .remote {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
    }

    .ocurre {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #991b1b;
    }

    .unknown {
      background: #e5e7eb;
      border: 1px solid #9ca3af;
      color: #374151;
    }

    .table {
      margin-top: 35px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f9fafb;
    }

    .watermark {
      position: fixed;
      bottom: 12px;
      right: 18px;
      font-size: 14px;
      color: rgba(0,0,0,0.18);
      pointer-events: none;
      user-select: none;
      z-index: 9999;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 25px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="watermark">Kimi 制作</div>
  <div class="container">
    <h1>墨西哥邮编偏远区查询系统</h1>

    <div class="desc">
      海外仓 / 一件代发 / 墨西哥尾程专用<br>
      输入5位墨西哥邮编（CP）查询是否属于正常区、偏远区或 Ocurre 自提区域。
    </div>

    <div class="search-box">
      <input type="text" id="cpInput" maxlength="5" placeholder="例如：64000" />
      <button onclick="checkCP()">查询</button>
    </div>

    <div id="result" class="result"></div>

    <div class="table">
      <h3>系统逻辑说明</h3>

      <table>
        <thead>
          <tr>
            <th>类型</th>
            <th>说明</th>
            <th>建议</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>正常地区</td>
            <td>核心城市 / 主城区</td>
            <td>正常报价</td>
          </tr>
          <tr>
            <td>偏远地区</td>
            <td>山区 / 农村 / 低频派送</td>
            <td>加收偏远费</td>
          </tr>
          <tr>
            <td>Ocurre 自提</td>
            <td>仅支持门店自提</td>
            <td>客户自提</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      ※ 当前为佰腾墨西哥海外仓基础规则演示版。<br>
      ※ 可后续接入完整全国 CP 数据库 / Excel / API。<br>
      ※ 建议后续增加 FedEx / Estafeta / Castores 独立判断逻辑。
    </div>
  </div>

  <script>
    const mexicoStates = [
      { state: 'Aguascalientes', start: 20000, end: 20999, type: 'normal' },
      { state: 'Baja California', start: 21000, end: 22999, type: 'normal' },
      { state: 'Baja California Sur', start: 23000, end: 23999, type: 'remote' },
      { state: 'Campeche', start: 24000, end: 24999, type: 'remote' },
      { state: 'Coahuila', start: 25000, end: 27999, type: 'normal' },
      { state: 'Colima', start: 28000, end: 28999, type: 'normal' },
      { state: 'Chiapas', start: 29000, end: 30999, type: 'remote' },
      { state: 'Chihuahua', start: 31000, end: 33999, type: 'remote' },
      { state: 'Durango', start: 34000, end: 35999, type: 'remote' },
      { state: 'Guanajuato', start: 36000, end: 38999, type: 'normal' },
      { state: 'Guerrero', start: 39000, end: 41999, type: 'remote' },
      { state: 'Hidalgo', start: 42000, end: 43999, type: 'normal' },
      { state: 'Jalisco', start: 44000, end: 49999, type: 'normal' },
      { state: 'Estado de México', start: 50000, end: 57999, type: 'normal' },
      { state: 'Michoacán', start: 58000, end: 61999, type: 'remote' },
      { state: 'Morelos', start: 62000, end: 62999, type: 'normal' },
      { state: 'Nayarit', start: 63000, end: 63999, type: 'remote' },
      { state: 'Nuevo León', start: 64000, end: 67999, type: 'normal' },
      { state: 'Oaxaca', start: 68000, end: 71999, type: 'remote' },
      { state: 'Puebla', start: 72000, end: 75999, type: 'normal' },
      { state: 'Querétaro', start: 76000, end: 76999, type: 'normal' },
      { state: 'Quintana Roo', start: 77000, end: 77999, type: 'mixed' },
      { state: 'San Luis Potosí', start: 78000, end: 79999, type: 'normal' },
      { state: 'Sinaloa', start: 80000, end: 82999, type: 'mixed' },
      { state: 'Sonora', start: 83000, end: 85999, type: 'remote' },
      { state: 'Tabasco', start: 86000, end: 87999, type: 'mixed' },
      { state: 'Tamaulipas', start: 87000, end: 89999, type: 'mixed' },
      { state: 'Tlaxcala', start: 90000, end: 90999, type: 'normal' },
      { state: 'Veracruz', start: 91000, end: 96999, type: 'mixed' },
      { state: 'Yucatán', start: 97000, end: 97999, type: 'normal' },
      { state: 'Zacatecas', start: 98000, end: 99999, type: 'remote' },
      { state: 'CDMX', start: 1000, end: 16999, type: 'normal' }
    ];

    const normalRules = [
      { start: 1000, end: 16999, city: 'CDMX' },
      { start: 44100, end: 45599, city: 'Guadalajara' },
      { start: 64000, end: 67999, city: 'Monterrey' },
      { start: 72000, end: 75999, city: 'Puebla' },
      { start: 76000, end: 76999, city: 'Querétaro' },
      { start: 97000, end: 97999, city: 'Mérida' },
      { start: 77500, end: 77569, city: 'Cancún' }
    ];

    const remoteRules = [
      { start: 29500, end: 30999, state: 'Chiapas' },
      { start: 68000, end: 71999, state: 'Oaxaca' },
      { start: 39000, end: 41999, state: 'Guerrero' },
      { start: 83000, end: 84999, state: 'Sonora' },
      { start: 33000, end: 35999, state: 'Chihuahua / Durango' },
      { start: 24000, end: 24999, state: 'Campeche' },
      { start: 77800, end: 77999, state: 'Quintana Roo Rural' }
    ];

    const ocurreRules = [
      { start: 70900, end: 70999, state: 'Oaxaca Rural' },
      { start: 29650, end: 29699, state: 'Chiapas Sierra' },
      { start: 40900, end: 40999, state: 'Guerrero Sierra' }
    ];

    function checkCP() {
      const cp = document.getElementById('cpInput').value.trim();
      const result = document.getElementById('result');

      result.style.display = 'block';

      if (!/^\d{5}$/.test(cp)) {
        result.className = 'result unknown';
        result.innerHTML = `
          <strong>请输入有效的5位墨西哥邮编（CP）</strong>
        `;
        return;
      }

      const cpNum = parseInt(cp);

      for (const rule of ocurreRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) {
          result.className = 'result ocurre';
          result.innerHTML = `
            <h2>⚠ Ocurre 自提区域</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>地区：</strong> ${rule.state}<br>
            <strong>派送类型：</strong> 仅支持门店自提（Ocurre）<br>
            <strong>建议：</strong> 提前通知客户自提，并预收偏远费用。
          `;
          return;
        }
      }

      for (const rule of remoteRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) {
          result.className = 'result remote';
          result.innerHTML = `
            <h2>⚠ 偏远地区</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>区域：</strong> ${rule.state}<br>
            <strong>类型：</strong> Zona Extendida / Rural<br>
            <strong>建议：</strong> 建议加收偏远费（120~250 MXN）。
          `;
          return;
        }
      }

      const lastThree = cpNum % 1000;

      if (lastThree > 800) {
        result.className = 'result remote';
        result.innerHTML = `
          <h2>⚠ 偏远地区</h2>
          <strong>邮编：</strong> ${cp}<br>
          <strong>判定规则：</strong> 邮编后三位大于 800<br>
          <strong>类型：</strong> 高概率偏远区域<br>
          <strong>建议：</strong> 建议加收偏远费，并提前确认是否支持到门派送。
        `;
        return;
      }

      for (const rule of normalRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) {
          result.className = 'result normal';
          result.innerHTML = `
            <h2>✅ 正常地区</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>核心区域：</strong> ${rule.city}<br>
            <strong>派送类型：</strong> 正常到门<br>
            <strong>建议：</strong> 使用标准报价即可。
          `;
          return;
        }
      }

      for (const stateInfo of mexicoStates) {
        if (cpNum >= stateInfo.start && cpNum <= stateInfo.end) {
          let typeText = '普通地区';
          let advice = '建议正常报价。';
          let cssClass = 'normal';

          if (stateInfo.type === 'remote') {
            typeText = '偏远概率较高';
            advice = '建议提前确认是否收取偏远费。';
            cssClass = 'remote';
          }

          if (stateInfo.type === 'mixed') {
            typeText = '部分区域偏远';
            advice = '建议结合具体地址确认。';
            cssClass = 'unknown';
          }

          result.className = `result ${cssClass}`;
          result.innerHTML = `
            <h2>📍 邮编查询结果</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>所属州：</strong> ${stateInfo.state}<br>
            <strong>区域类型：</strong> ${typeText}<br>
            <strong>建议：</strong> ${advice}
          `;
          return;
        }
      }

      result.className = 'result unknown';
      result.innerHTML = `
        <h2>ℹ 未识别邮编</h2>
        <strong>邮编：</strong> ${cp}<br>
        当前系统无法识别该邮编，请人工确认。
      `;
    }
  </script>
</body>
</html>
