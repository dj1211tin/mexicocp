<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨西哥邮编偏远区查询系统</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 95%;
      max-width: 720px;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #1f2937;
      text-align: center;
    }

    .desc {
      text-align: center;
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 18px;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1f2937;
    }

    .result {
      margin-top: 25px;
      padding: 24px;
      border-radius: 14px;
      display: none;
      line-height: 1.85;
      font-size: 15.5px;
    }

    .normal {
      background: #ecfdf5;
      border: 1px solid #10b981;
      color: #065f46;
    }

    .remote {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
    }

    .ocurre {
      background: #fee2e2;
      border: 1px solid #ef4444;
      color: #991b1b;
    }

    .unknown {
      background: #e5e7eb;
      border: 1px solid #9ca3af;
      color: #374151;
    }

    .result h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .table {
      margin-top: 35px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 11px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f9fafb;
    }

    .watermark {
      position: fixed;
      bottom: 12px;
      right: 18px;
      font-size: 14px;
      color: rgba(0,0,0,0.18);
      pointer-events: none;
      user-select: none;
      z-index: 9999;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 30px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="watermark">Kimi 制作</div>
  <div class="container">
    <h1>墨西哥邮编偏远区查询系统</h1>

    <div class="desc">
      佰腾海外仓 / 一件代发 / 墨西哥尾程专用<br>
      输入5位墨西哥邮编（CP）查询州、城市、正常区、偏远区或 Ocurre 自提区域
    </div>

    <div class="search-box">
      <input type="text" id="cpInput" maxlength="5" placeholder="例如：64000" />
      <button onclick="checkCP()">查询</button>
    </div>

    <div id="result" class="result"></div>

    <div class="table">
      <h3>系统逻辑说明</h3>
      <table>
        <thead>
          <tr>
            <th>类型</th>
            <th>说明</th>
            <th>建议</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>正常地区</td>
            <td>核心城市 / 主城区</td>
            <td>正常报价，无偏远费</td>
          </tr>
          <tr>
            <td>偏远地区</td>
            <td>山区 / 农村 / 低频派送</td>
            <td>加收偏远费（120~300 MXN）</td>
          </tr>
          <tr>
            <td>Ocurre 自提</td>
            <td>仅支持门店自提</td>
            <td>客户需前往网点自提</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      ※ 当前为演示版，基于主流物流公司（DHL/Estafeta/FedEx）经验规则<br>
      ※ 建议实际发货前仍以物流商官方查询为准<br>
      ※ 可后续接入完整全国 CP 数据库
    </div>
  </div>

  <script>
    // 州信息
    const mexicoStates = [
      { state: 'CDMX', start: 1000, end: 16999, type: 'normal' },
      { state: 'Aguascalientes', start: 20000, end: 20999, type: 'normal' },
      { state: 'Baja California', start: 21000, end: 22999, type: 'normal' },
      { state: 'Baja California Sur', start: 23000, end: 23999, type: 'remote' },
      { state: 'Campeche', start: 24000, end: 24999, type: 'remote' },
      { state: 'Coahuila', start: 25000, end: 27999, type: 'normal' },
      { state: 'Colima', start: 28000, end: 28999, type: 'normal' },
      { state: 'Chiapas', start: 29000, end: 30999, type: 'remote' },
      { state: 'Chihuahua', start: 31000, end: 33999, type: 'remote' },
      { state: 'Durango', start: 34000, end: 35999, type: 'remote' },
      { state: 'Guanajuato', start: 36000, end: 38999, type: 'normal' },
      { state: 'Guerrero', start: 39000, end: 41999, type: 'remote' },
      { state: 'Hidalgo', start: 42000, end: 43999, type: 'normal' },
      { state: 'Jalisco', start: 44000, end: 49999, type: 'normal' },
      { state: 'Estado de México', start: 50000, end: 57999, type: 'normal' },
      { state: 'Michoacán', start: 58000, end: 61999, type: 'remote' },
      { state: 'Morelos', start: 62000, end: 62999, type: 'normal' },
      { state: 'Nayarit', start: 63000, end: 63999, type: 'remote' },
      { state: 'Nuevo León', start: 64000, end: 67999, type: 'normal' },
      { state: 'Oaxaca', start: 68000, end: 71999, type: 'remote' },
      { state: 'Puebla', start: 72000, end: 75999, type: 'normal' },
      { state: 'Querétaro', start: 76000, end: 76999, type: 'normal' },
      { state: 'Quintana Roo', start: 77000, end: 77999, type: 'mixed' },
      { state: 'San Luis Potosí', start: 78000, end: 79999, type: 'normal' },
      { state: 'Sinaloa', start: 80000, end: 82999, type: 'mixed' },
      { state: 'Sonora', start: 83000, end: 85999, type: 'remote' },
      { state: 'Tabasco', start: 86000, end: 87999, type: 'mixed' },
      { state: 'Tamaulipas', start: 87000, end: 89999, type: 'mixed' },
      { state: 'Tlaxcala', start: 90000, end: 90999, type: 'normal' },
      { state: 'Veracruz', start: 91000, end: 96999, type: 'mixed' },
      { state: 'Yucatán', start: 97000, end: 97999, type: 'normal' },
      { state: 'Zacatecas', start: 98000, end: 99999, type: 'remote' }
    ];

    // 核心城市精准匹配
    const cityRules = [
      { start: 1000, end: 16999, city: 'Ciudad de México' },
      { start: 44100, end: 45599, city: 'Guadalajara' },
      { start: 64000, end: 67999, city: 'Monterrey' },
      { start: 72000, end: 75999, city: 'Puebla' },
      { start: 76000, end: 76999, city: 'Querétaro' },
      { start: 97000, end: 97999, city: 'Mérida' },
      { start: 77500, end: 77569, city: 'Cancún' },
      { start: 25000, end: 25999, city: 'Saltillo' },
      { start: 36000, end: 37999, city: 'León' }
    ];

    // 偏远规则
    const remoteRules = [
      { start: 29500, end: 30999, note: 'Chiapas 高风险' },
      { start: 68000, end: 71999, note: 'Oaxaca' },
      { start: 39000, end: 41999, note: 'Guerrero' },
      { start: 83000, end: 84999, note: 'Sonora 偏远' },
      { start: 33000, end: 35999, note: 'Chihuahua / Durango' },
      { start: 24000, end: 24999, note: 'Campeche' },
      { start: 77800, end: 77999, note: 'Quintana Roo 乡村' }
    ];

    // Ocurre 自提规则
    const ocurreRules = [
      { start: 70900, end: 70999, note: 'Oaxaca Rural' },
      { start: 29650, end: 29699, note: 'Chiapas Sierra' },
      { start: 40900, end: 40999, note: 'Guerrero Sierra' }
    ];

    function checkCP() {
      const cp = document.getElementById('cpInput').value.trim();
      const resultDiv = document.getElementById('result');

      resultDiv.style.display = 'block';

      if (!/^\d{5}$/.test(cp)) {
        resultDiv.className = 'result unknown';
        resultDiv.innerHTML = `<strong>❌ 请输入有效的5位墨西哥邮编（CP）</strong>`;
        return;
      }

      const cpNum = parseInt(cp);

      // 1. Ocurre 自提优先判断
      for (const rule of ocurreRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) {
          resultDiv.className = 'result ocurre';
          resultDiv.innerHTML = `
            <h2>⚠️ Ocurre 自提区域</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>州：</strong> ${getState(cpNum)}<br>
            <strong>城市/区域：</strong> ${rule.note}<br>
            <strong>派送类型：</strong> <span style="color:#ef4444">仅支持门店自提</span><br>
            <strong>建议：</strong> 客户必须前往当地网点自提，建议预收偏远/自提费用。
          `;
          return;
        }
      }

      // 2. 偏远区域判断
      for (const rule of remoteRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) {
          resultDiv.className = 'result remote';
          resultDiv.innerHTML = `
            <h2>⚠️ 偏远地区</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>州：</strong> ${getState(cpNum)}<br>
            <strong>城市/区域：</strong> ${getCity(cpNum)}<br>
            <strong>类型：</strong> Zona Extendida / Rural<br>
            <strong>建议：</strong> 加收偏远费（约120~300 MXN），时效较慢。
          `;
          return;
        }
      }

      // 3. 邮编后三位 > 800 自动判定为偏远
      const lastThree = cpNum % 1000;
      if (lastThree > 800) {
        resultDiv.className = 'result remote';
        resultDiv.innerHTML = `
          <h2>⚠️ 偏远地区</h2>
          <strong>邮编：</strong> ${cp}<br>
          <strong>州：</strong> ${getState(cpNum)}<br>
          <strong>城市/区域：</strong> ${getCity(cpNum)}<br>
          <strong>判定依据：</strong> 邮编后三位 > 800<br>
          <strong>类型：</strong> 高概率偏远区域<br>
          <strong>建议：</strong> 加收偏远费，建议提前确认派送方式。
        `;
        return;
      }

      // 4. 核心城市优先
      for (const rule of cityRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) {
          resultDiv.className = 'result normal';
          resultDiv.innerHTML = `
            <h2>✅ 正常派送区域</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>州：</strong> ${getState(cpNum)}<br>
            <strong>城市：</strong> ${rule.city}<br>
            <strong>派送类型：</strong> <span style="color:#10b981">正常到门派送</span><br>
            <strong>建议：</strong> 使用标准报价即可，无需加收偏远费。
          `;
          return;
        }
      }

      // 5. 按州常规判断
      for (const stateInfo of mexicoStates) {
        if (cpNum >= stateInfo.start && cpNum <= stateInfo.end) {
          let typeText = '正常地区';
          let advice = '使用标准报价即可。';
          let cssClass = 'normal';

          if (stateInfo.type === 'remote') {
            typeText = '偏远概率较高';
            advice = '建议确认是否收取偏远费。';
            cssClass = 'remote';
          } else if (stateInfo.type === 'mixed') {
            typeText = '混合区域（部分偏远）';
            advice = '建议结合具体 colonia 地址确认。';
            cssClass = 'unknown';
          }

          resultDiv.className = `result ${cssClass}`;
          resultDiv.innerHTML = `
            <h2>📍 邮编查询结果</h2>
            <strong>邮编：</strong> ${cp}<br>
            <strong>州：</strong> ${stateInfo.state}<br>
            <strong>城市/区域：</strong> ${getCity(cpNum)}<br>
            <strong>区域类型：</strong> ${typeText}<br>
            <strong>建议：</strong> ${advice}
          `;
          return;
        }
      }

      // 未识别
      resultDiv.className = 'result unknown';
      resultDiv.innerHTML = `
        <h2>ℹ️ 未识别邮编</h2>
        <strong>邮编：</strong> ${cp}<br>
        当前系统无法识别该邮编，请人工确认或联系物流商。
      `;
    }

    // 获取州名称
    function getState(cpNum) {
      for (const s of mexicoStates) {
        if (cpNum >= s.start && cpNum <= s.end) return s.state;
      }
      return '未知';
    }

    // 获取城市名称（默认返回空）
    function getCity(cpNum) {
      for (const rule of cityRules) {
        if (cpNum >= rule.start && cpNum <= rule.end) return rule.city;
      }
      return '（具体城市请结合地址查看）';
    }
  </script>
</body>
</html>
